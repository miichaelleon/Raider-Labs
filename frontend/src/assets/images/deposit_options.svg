<svg viewBox="0 0 600 240" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Two Ways to Deposit a Check</text>

<rect x="60" y="60" width="220" height="160" rx="12" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<g transform="translate(140 85)">
<rect x="0" y="0" width="60" height="50" rx="6" fill="#cc0000"/>
<rect x="6" y="12" width="48" height="6" rx="2" fill="#fff" opacity="0.8"/>
<rect x="6" y="22" width="38" height="4" rx="2" fill="#fff" opacity="0.6"/>
<rect x="6" y="32" width="44" height="4" rx="2" fill="#fff" opacity="0.6"/>
</g>
<text x="170" y="160" text-anchor="middle" fill="#cc0000" font-size="13" font-weight="700">In Person</text>
<text x="170" y="185" text-anchor="middle" fill="#666" font-size="11">Take it to your bank</text>
<text x="170" y="200" text-anchor="middle" fill="#666" font-size="11">Hand it to a teller</text>

<rect x="320" y="60" width="220" height="160" rx="12" fill="#fff" stroke="#5b8dd9" stroke-width="2"/>
<g transform="translate(420 80)">
<rect x="0" y="0" width="40" height="70" rx="6" fill="#5b8dd9"/>
<rect x="3" y="6" width="34" height="50" rx="3" fill="#fff"/>
<rect x="6" y="10" width="28" height="3" rx="1" fill="#5b8dd9" opacity="0.4"/>
<rect x="6" y="16" width="22" height="3" rx="1" fill="#5b8dd9" opacity="0.4"/>
<circle cx="20" cy="34" r="6" fill="#5b8dd9" opacity="0.3"/>
<text x="20" y="38" text-anchor="middle" fill="#5b8dd9" font-size="8" font-weight="700">$</text>
<rect x="6" y="48" width="28" height="3" rx="1" fill="#5b8dd9" opacity="0.4"/>
</g>
<text x="430" y="160" text-anchor="middle" fill="#5b8dd9" font-size="13" font-weight="700">Mobile Deposit</text>
<text x="430" y="185" text-anchor="middle" fill="#666" font-size="11">Open your bank app</text>
<text x="430" y="200" text-anchor="middle" fill="#666" font-size="11">Take a photo of the check</text>
</svg>
