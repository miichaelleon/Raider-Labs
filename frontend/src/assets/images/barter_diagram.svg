<svg viewBox="0 0 600 240" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Bartering vs. Money</text>

<rect x="20" y="55" width="270" height="170" rx="12" fill="#fdf6f6" stroke="#cc0000" stroke-width="2"/>
<text x="155" y="80" text-anchor="middle" fill="#cc0000" font-size="13" font-weight="700">BARTERING</text>

<g transform="translate(50 95)">
<circle cx="20" cy="20" r="16" fill="#fff" stroke="#cc0000" stroke-width="1.5"/>
<text x="20" y="25" text-anchor="middle" font-size="14">🐔</text>
<text x="20" y="58" text-anchor="middle" font-size="11" fill="#666">Person A</text>
</g>

<g transform="translate(195 95)">
<circle cx="20" cy="20" r="16" fill="#fff" stroke="#cc0000" stroke-width="1.5"/>
<text x="20" y="25" text-anchor="middle" font-size="14">👟</text>
<text x="20" y="58" text-anchor="middle" font-size="11" fill="#666">Person B</text>
</g>

<line x1="90" y1="115" x2="205" y2="115" stroke="#cc0000" stroke-width="1.5" stroke-dasharray="4 3"/>
<polygon points="205,115 198,111 198,119" fill="#cc0000"/>
<polygon points="90,115 97,111 97,119" fill="#cc0000"/>

<text x="155" y="180" text-anchor="middle" fill="#666" font-size="12">Hard to find someone</text>
<text x="155" y="195" text-anchor="middle" fill="#666" font-size="12">who wants to trade</text>

<rect x="310" y="55" width="270" height="170" rx="12" fill="#f0f9f5" stroke="#4a9e6b" stroke-width="2"/>
<text x="445" y="80" text-anchor="middle" fill="#4a9e6b" font-size="13" font-weight="700">USING MONEY</text>

<g transform="translate(335 95)">
<circle cx="20" cy="20" r="16" fill="#fff" stroke="#4a9e6b" stroke-width="1.5"/>
<text x="20" y="25" text-anchor="middle" font-size="14">🐔</text>
<text x="20" y="58" text-anchor="middle" font-size="11" fill="#666">Sell for $</text>
</g>

<g transform="translate(420 100)">
<rect x="0" y="0" width="35" height="22" rx="3" fill="#4a9e6b"/>
<text x="17" y="16" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">$</text>
<text x="17" y="40" text-anchor="middle" font-size="11" fill="#666">Money</text>
</g>

<g transform="translate(510 95)">
<circle cx="20" cy="20" r="16" fill="#fff" stroke="#4a9e6b" stroke-width="1.5"/>
<text x="20" y="25" text-anchor="middle" font-size="14">👟</text>
<text x="20" y="58" text-anchor="middle" font-size="11" fill="#666">Buy with $</text>
</g>

<line x1="370" y1="115" x2="420" y2="115" stroke="#4a9e6b" stroke-width="1.5"/>
<polygon points="420,115 413,111 413,119" fill="#4a9e6b"/>
<line x1="460" y1="115" x2="510" y2="115" stroke="#4a9e6b" stroke-width="1.5"/>
<polygon points="510,115 503,111 503,119" fill="#4a9e6b"/>

<text x="445" y="180" text-anchor="middle" fill="#666" font-size="12">Money is accepted</text>
<text x="445" y="195" text-anchor="middle" fill="#666" font-size="12">by everyone</text>
</svg>
