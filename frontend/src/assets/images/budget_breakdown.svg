<svg viewBox="0 0 600 240" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Sample Monthly Budget</text>

<rect x="40" y="60" width="240" height="160" rx="10" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<text x="160" y="85" text-anchor="middle" fill="#cc0000" font-size="13" font-weight="700">INCOME</text>
<text x="160" y="125" text-anchor="middle" fill="#111" font-size="32" font-weight="700">$2,000</text>
<text x="160" y="155" text-anchor="middle" fill="#666" font-size="11">Wages from work</text>
<text x="160" y="170" text-anchor="middle" fill="#666" font-size="11">(or other sources)</text>

<rect x="320" y="60" width="240" height="160" rx="10" fill="#fff" stroke="#5b8dd9" stroke-width="2"/>
<text x="440" y="85" text-anchor="middle" fill="#5b8dd9" font-size="13" font-weight="700">MONTHLY BILLS</text>
<g transform="translate(340 100)">
<text x="0" y="15" fill="#111" font-size="12">Rent</text>
<text x="200" y="15" text-anchor="end" fill="#111" font-size="12" font-weight="600">$700</text>
<text x="0" y="35" fill="#111" font-size="12">Utilities</text>
<text x="200" y="35" text-anchor="end" fill="#111" font-size="12" font-weight="600">$150</text>
<text x="0" y="55" fill="#111" font-size="12">Phone</text>
<text x="200" y="55" text-anchor="end" fill="#111" font-size="12" font-weight="600">$50</text>
<text x="0" y="75" fill="#111" font-size="12">Groceries</text>
<text x="200" y="75" text-anchor="end" fill="#111" font-size="12" font-weight="600">$200</text>
<line x1="0" y1="85" x2="200" y2="85" stroke="#5b8dd9" stroke-width="1"/>
<text x="0" y="103" fill="#5b8dd9" font-size="13" font-weight="700">TOTAL</text>
<text x="200" y="103" text-anchor="end" fill="#5b8dd9" font-size="13" font-weight="700">$1,100</text>
</g>

<text x="300" y="232" text-anchor="middle" fill="#4a9e6b" font-size="14" font-weight="700">$2,000 − $1,100 = $900 left over</text>
</svg>
