<svg viewBox="0 0 600 220" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Can You Afford It?</text>

<rect x="40" y="60" width="160" height="120" rx="10" fill="#fff" stroke="#5b8dd9" stroke-width="2"/>
<text x="120" y="85" text-anchor="middle" fill="#5b8dd9" font-size="11" font-weight="700">YOUR BALANCE</text>
<text x="120" y="125" text-anchor="middle" fill="#111" font-size="28" font-weight="700">$120</text>
<text x="120" y="155" text-anchor="middle" fill="#666" font-size="11">Available</text>

<g transform="translate(220 110)">
<line x1="0" y1="10" x2="40" y2="10" stroke="#888" stroke-width="2"/>
<text x="20" y="0" text-anchor="middle" fill="#888" font-size="14" font-weight="700">vs</text>
<polygon points="40,10 33,5 33,15" fill="#888"/>
</g>

<rect x="280" y="60" width="160" height="120" rx="10" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<text x="360" y="85" text-anchor="middle" fill="#cc0000" font-size="11" font-weight="700">PURCHASE</text>
<text x="360" y="125" text-anchor="middle" fill="#111" font-size="28" font-weight="700">$40</text>
<text x="360" y="155" text-anchor="middle" fill="#666" font-size="11">Cost</text>

<rect x="460" y="60" width="100" height="120" rx="10" fill="#f0f9f5" stroke="#4a9e6b" stroke-width="2"/>
<text x="510" y="100" text-anchor="middle" fill="#4a9e6b" font-size="32">✓</text>
<text x="510" y="135" text-anchor="middle" fill="#4a9e6b" font-size="13" font-weight="700">YES!</text>
<text x="510" y="160" text-anchor="middle" fill="#666" font-size="10">$120 &gt; $40</text>

<text x="300" y="210" text-anchor="middle" fill="#666" font-size="12" font-style="italic">If your balance is greater than the cost, you can afford it.</text>
</svg>
