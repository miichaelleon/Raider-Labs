<svg viewBox="0 0 600 280" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="35" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Needs vs. Wants</text>

<rect x="40" y="60" width="240" height="200" rx="12" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<text x="160" y="90" text-anchor="middle" fill="#cc0000" font-size="14" font-weight="700">NEEDS</text>
<text x="160" y="108" text-anchor="middle" fill="#666" font-size="11">Essential for survival</text>

<g transform="translate(60 125)">
<rect x="0" y="0" width="200" height="28" rx="6" fill="#fff5f5"/>
<text x="14" y="19" fill="#cc0000" font-size="14">🏠</text>
<text x="40" y="19" fill="#111" font-size="13">Rent / Housing</text>
</g>
<g transform="translate(60 160)">
<rect x="0" y="0" width="200" height="28" rx="6" fill="#fff5f5"/>
<text x="14" y="19" fill="#cc0000" font-size="14">🍎</text>
<text x="40" y="19" fill="#111" font-size="13">Food / Groceries</text>
</g>
<g transform="translate(60 195)">
<rect x="0" y="0" width="200" height="28" rx="6" fill="#fff5f5"/>
<text x="14" y="19" fill="#cc0000" font-size="14">💡</text>
<text x="40" y="19" fill="#111" font-size="13">Utilities (water, power)</text>
</g>
<g transform="translate(60 230)">
<rect x="0" y="0" width="200" height="22" rx="6" fill="#fff5f5"/>
<text x="14" y="16" fill="#cc0000" font-size="13">💊</text>
<text x="40" y="16" fill="#111" font-size="12">Medicine</text>
</g>

<rect x="320" y="60" width="240" height="200" rx="12" fill="#fff" stroke="#5b8dd9" stroke-width="2"/>
<text x="440" y="90" text-anchor="middle" fill="#5b8dd9" font-size="14" font-weight="700">WANTS</text>
<text x="440" y="108" text-anchor="middle" fill="#666" font-size="11">Nice but not essential</text>

<g transform="translate(340 125)">
<rect x="0" y="0" width="200" height="28" rx="6" fill="#f0f6fc"/>
<text x="14" y="19" fill="#5b8dd9" font-size="14">🎮</text>
<text x="40" y="19" fill="#111" font-size="13">Video games</text>
</g>
<g transform="translate(340 160)">
<rect x="0" y="0" width="200" height="28" rx="6" fill="#f0f6fc"/>
<text x="14" y="19" fill="#5b8dd9" font-size="14">🍔</text>
<text x="40" y="19" fill="#111" font-size="13">Eating out</text>
</g>
<g transform="translate(340 195)">
<rect x="0" y="0" width="200" height="28" rx="6" fill="#f0f6fc"/>
<text x="14" y="19" fill="#5b8dd9" font-size="14">🎬</text>
<text x="40" y="19" fill="#111" font-size="13">Movies / Concerts</text>
</g>
<g transform="translate(340 230)">
<rect x="0" y="0" width="200" height="22" rx="6" fill="#f0f6fc"/>
<text x="14" y="16" fill="#5b8dd9" font-size="13">👟</text>
<text x="40" y="16" fill="#111" font-size="12">New designer shoes</text>
</g>
</svg>
