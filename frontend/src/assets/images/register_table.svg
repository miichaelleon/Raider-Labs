<svg viewBox="0 0 600 280" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="700">A Transaction Register</text>

<rect x="40" y="55" width="520" height="200" rx="10" fill="#fff" stroke="#cc0000" stroke-width="2"/>

<rect x="40" y="55" width="520" height="32" fill="#fff5f5"/>
<text x="80" y="76" fill="#cc0000" font-size="11" font-weight="700">DATE</text>
<text x="160" y="76" fill="#cc0000" font-size="11" font-weight="700">DESCRIPTION</text>
<text x="340" y="76" fill="#cc0000" font-size="11" font-weight="700">AMOUNT</text>
<text x="445" y="76" fill="#cc0000" font-size="11" font-weight="700">TYPE</text>
<text x="510" y="76" fill="#cc0000" font-size="11" font-weight="700">BALANCE</text>

<line x1="40" y1="87" x2="560" y2="87" stroke="#e5e5e5"/>

<text x="80" y="108" fill="#666" font-size="11">3/01</text>
<text x="160" y="108" fill="#111" font-size="11" font-weight="500">Starting balance</text>
<text x="340" y="108" fill="#111" font-size="11">—</text>
<text x="445" y="108" fill="#888" font-size="11">—</text>
<text x="510" y="108" fill="#4a9e6b" font-size="11" font-weight="600">$500</text>
<line x1="40" y1="118" x2="560" y2="118" stroke="#f0f0f0"/>

<text x="80" y="138" fill="#666" font-size="11">3/03</text>
<text x="160" y="138" fill="#111" font-size="11" font-weight="500">Check #101 - Rent</text>
<text x="340" y="138" fill="#cc0000" font-size="11">- $120</text>
<text x="445" y="138" fill="#888" font-size="11">Withdrawal</text>
<text x="510" y="138" fill="#111" font-size="11" font-weight="600">$380</text>
<line x1="40" y1="148" x2="560" y2="148" stroke="#f0f0f0"/>

<text x="80" y="168" fill="#666" font-size="11">3/10</text>
<text x="160" y="168" fill="#111" font-size="11" font-weight="500">Paycheck deposit</text>
<text x="340" y="168" fill="#4a9e6b" font-size="11">+ $200</text>
<text x="445" y="168" fill="#888" font-size="11">Deposit</text>
<text x="510" y="168" fill="#111" font-size="11" font-weight="600">$580</text>
<line x1="40" y1="178" x2="560" y2="178" stroke="#f0f0f0"/>

<text x="80" y="198" fill="#666" font-size="11">3/15</text>
<text x="160" y="198" fill="#111" font-size="11" font-weight="500">Check #102 - Utilities</text>
<text x="340" y="198" fill="#cc0000" font-size="11">- $45</text>
<text x="445" y="198" fill="#888" font-size="11">Withdrawal</text>
<text x="510" y="198" fill="#111" font-size="11" font-weight="600">$535</text>
<line x1="40" y1="208" x2="560" y2="208" stroke="#f0f0f0"/>

<text x="80" y="228" fill="#666" font-size="11">3/20</text>
<text x="160" y="228" fill="#111" font-size="11" font-weight="500">Check #103 - Groceries</text>
<text x="340" y="228" fill="#cc0000" font-size="11">- $30</text>
<text x="445" y="228" fill="#888" font-size="11">Withdrawal</text>
<text x="510" y="228" fill="#111" font-size="11" font-weight="600">$505</text>

<text x="300" y="270" text-anchor="middle" fill="#666" font-size="11" font-style="italic">Each row updates the balance. Add deposits, subtract withdrawals.</text>
</svg>
