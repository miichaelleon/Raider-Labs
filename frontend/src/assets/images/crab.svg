<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Animated 8-bit crab</title>
<desc>An animated pixel art crab with waving claws and bobbing body</desc>
<style>
  .px { shape-rendering: crispEdges; }
  @keyframes clawL {
    0%, 100% { transform: rotate(0deg); transform-origin: 264px 240px; }
    50% { transform: rotate(-15deg); transform-origin: 264px 240px; }
  }
  @keyframes clawR {
    0%, 100% { transform: rotate(0deg); transform-origin: 416px 240px; }
    50% { transform: rotate(15deg); transform-origin: 416px 240px; }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  @keyframes eyeblink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes legL {
    0%, 100% { transform: rotate(0deg); transform-origin: 248px 320px; }
    50% { transform: rotate(8deg); transform-origin: 248px 320px; }
  }
  @keyframes legR {
    0%, 100% { transform: rotate(0deg); transform-origin: 432px 320px; }
    50% { transform: rotate(-8deg); transform-origin: 432px 320px; }
  }
  .body-group { animation: bob 1s ease-in-out infinite; }
  .claw-left { animation: clawL 0.8s ease-in-out infinite; }
  .claw-right { animation: clawR 0.8s ease-in-out infinite alternate; }
  .eye-left { animation: eyeblink 3s ease-in-out infinite; transform-origin: 304px 156px; }
  .eye-right { animation: eyeblink 3s ease-in-out infinite 0.1s; transform-origin: 376px 156px; }
  .legs-left { animation: legL 0.8s ease-in-out infinite; }
  .legs-right { animation: legR 0.8s ease-in-out infinite; }
</style>

<rect class="px" x="248" y="368" width="184" height="16" rx="0" fill="#e0e0e0"/>

<g class="body-group">
  <g class="legs-left">
    <rect class="px" x="232" y="288" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="216" y="304" width="16" height="32" fill="#c02020"/>
    <rect class="px" x="200" y="336" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="240" y="304" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="224" y="320" width="16" height="32" fill="#c02020"/>
    <rect class="px" x="208" y="352" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="248" y="320" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="232" y="336" width="16" height="24" fill="#c02020"/>
    <rect class="px" x="216" y="360" width="16" height="8" fill="#c02020"/>
  </g>

  <g class="legs-right">
    <rect class="px" x="432" y="288" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="448" y="304" width="16" height="32" fill="#c02020"/>
    <rect class="px" x="464" y="336" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="424" y="304" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="440" y="320" width="16" height="32" fill="#c02020"/>
    <rect class="px" x="456" y="352" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="416" y="320" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="432" y="336" width="16" height="24" fill="#c02020"/>
    <rect class="px" x="448" y="360" width="16" height="8" fill="#c02020"/>
  </g>

  <g class="claw-left">
    <rect class="px" x="192" y="224" width="72" height="16" fill="#e03030"/>
    <rect class="px" x="176" y="240" width="16" height="16" fill="#e03030"/>
    <rect class="px" x="144" y="240" width="48" height="48" fill="#e03030"/>
    <rect class="px" x="144" y="240" width="48" height="16" fill="#c02020"/>
    <rect class="px" x="144" y="272" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="176" y="272" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="160" y="256" width="16" height="16" fill="white" opacity="0.7"/>
    <rect class="px" x="152" y="248" width="8" height="8" fill="#f06060"/>
  </g>

  <g class="claw-right">
    <rect class="px" x="416" y="224" width="72" height="16" fill="#e03030"/>
    <rect class="px" x="488" y="240" width="16" height="16" fill="#e03030"/>
    <rect class="px" x="488" y="240" width="48" height="48" fill="#e03030"/>
    <rect class="px" x="488" y="240" width="48" height="16" fill="#c02020"/>
    <rect class="px" x="488" y="272" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="520" y="272" width="16" height="16" fill="#c02020"/>
    <rect class="px" x="504" y="256" width="16" height="16" fill="white" opacity="0.7"/>
    <rect class="px" x="496" y="248" width="8" height="8" fill="#f06060"/>
  </g>

  <rect class="px" x="264" y="208" width="152" height="112" fill="#e03030"/>
  <rect class="px" x="280" y="192" width="120" height="16" fill="#e03030"/>
  <rect class="px" x="296" y="176" width="88" height="16" fill="#c02020"/>
  <rect class="px" x="264" y="208" width="16" height="112" fill="#c02020"/>
  <rect class="px" x="400" y="208" width="16" height="112" fill="#c02020"/>
  <rect class="px" x="280" y="208" width="120" height="16" fill="#f04040"/>
  <rect class="px" x="296" y="256" width="88" height="48" fill="#f07040"/>
  <rect class="px" x="312" y="272" width="56" height="16" fill="#f09060"/>

  <rect class="px" x="312" y="240" width="8" height="8" fill="#111111"/>
  <rect class="px" x="320" y="248" width="40" height="8" fill="#111111"/>
  <rect class="px" x="360" y="240" width="8" height="8" fill="#111111"/>

  <rect class="px" x="296" y="160" width="16" height="32" fill="#c02020"/>
  <rect class="px" x="368" y="160" width="16" height="32" fill="#c02020"/>

  <g class="eye-left">
    <rect class="px" x="288" y="144" width="32" height="24" fill="#111111"/>
    <rect class="px" x="296" y="148" width="12" height="12" fill="#ffffff"/>
    <rect class="px" x="300" y="152" width="6" height="6" fill="#111111"/>
  </g>
  <g class="eye-right">
