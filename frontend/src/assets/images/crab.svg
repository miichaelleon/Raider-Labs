    <rect class="px" x="368" y="148" width="12" height="12" fill="#ffffff"/>
    <rect class="px" x="372" y="152" width="6" height="6" fill="#111111"/>
  </g>

  <rect class="px" x="304" y="128" width="8" height="32" fill="#c02020"/>
  <rect class="px" x="296" y="112" width="8" height="16" fill="#c02020"/>
  <rect class="px" x="288" y="104" width="8" height="8" fill="#c02020"/>
  <rect class="px" x="368" y="128" width="8" height="32" fill="#c02020"/>
  <rect class="px" x="376" y="112" width="8" height="16" fill="#c02020"/>
  <rect class="px" x="384" y="104" width="8" height="8" fill="#c02020"/>
</g>
</svg>
