<svg viewBox="0 0 600 280" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="35" text-anchor="middle" fill="#111" font-size="18" font-weight="700">The Three Roles of Money</text>

<rect x="40" y="60" width="160" height="180" rx="12" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<circle cx="120" cy="105" r="22" fill="#cc0000"/>
<text x="120" y="113" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">$</text>
<text x="120" y="160" text-anchor="middle" fill="#111" font-size="16" font-weight="700">Medium of</text>
<text x="120" y="180" text-anchor="middle" fill="#111" font-size="16" font-weight="700">Exchange</text>
<text x="120" y="210" text-anchor="middle" fill="#666" font-size="12">Used to buy</text>
<text x="120" y="225" text-anchor="middle" fill="#666" font-size="12">and sell things</text>

<rect x="220" y="60" width="160" height="180" rx="12" fill="#fff" stroke="#5b8dd9" stroke-width="2"/>
<rect x="270" y="85" width="60" height="40" rx="6" fill="#5b8dd9"/>
<rect x="278" y="93" width="44" height="6" rx="2" fill="#fff" opacity="0.6"/>
<rect x="278" y="105" width="30" height="6" rx="2" fill="#fff" opacity="0.6"/>
<text x="300" y="160" text-anchor="middle" fill="#111" font-size="16" font-weight="700">Store of</text>
<text x="300" y="180" text-anchor="middle" fill="#111" font-size="16" font-weight="700">Value</text>
<text x="300" y="210" text-anchor="middle" fill="#666" font-size="12">Holds worth</text>
<text x="300" y="225" text-anchor="middle" fill="#666" font-size="12">over time</text>

<rect x="400" y="60" width="160" height="180" rx="12" fill="#fff" stroke="#4a9e6b" stroke-width="2"/>
<g transform="translate(465 85)">
<rect x="0" y="0" width="30" height="40" rx="3" fill="none" stroke="#4a9e6b" stroke-width="2"/>
<line x1="6" y1="10" x2="24" y2="10" stroke="#4a9e6b" stroke-width="2"/>
<line x1="6" y1="20" x2="20" y2="20" stroke="#4a9e6b" stroke-width="2"/>
<line x1="6" y1="30" x2="22" y2="30" stroke="#4a9e6b" stroke-width="2"/>
</g>
<text x="480" y="160" text-anchor="middle" fill="#111" font-size="16" font-weight="700">Unit of</text>
<text x="480" y="180" text-anchor="middle" fill="#111" font-size="16" font-weight="700">Account</text>
<text x="480" y="210" text-anchor="middle" fill="#666" font-size="12">Measures the</text>
<text x="480" y="225" text-anchor="middle" fill="#666" font-size="12">value of things</text>
</svg>
