<svg viewBox="0 0 600 220" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="35" text-anchor="middle" fill="#111" font-size="18" font-weight="700">How Tax Deductions Work</text>

<rect x="40" y="70" width="120" height="100" rx="10" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<text x="100" y="100" text-anchor="middle" fill="#cc0000" font-size="11" font-weight="700">YOU EARN</text>
<text x="100" y="135" text-anchor="middle" fill="#111" font-size="22" font-weight="700">$100</text>
<text x="100" y="158" text-anchor="middle" fill="#666" font-size="11">Gross income</text>

<g transform="translate(180 110)">
<line x1="0" y1="10" x2="40" y2="10" stroke="#666" stroke-width="2"/>
<polygon points="40,10 33,5 33,15" fill="#666"/>
</g>

<rect x="240" y="70" width="120" height="100" rx="10" fill="#fdf6f6" stroke="#888" stroke-width="2" stroke-dasharray="5 3"/>
<text x="300" y="100" text-anchor="middle" fill="#888" font-size="11" font-weight="700">TAX DEDUCTED</text>
<text x="300" y="135" text-anchor="middle" fill="#888" font-size="22" font-weight="700">- $10</text>
<text x="300" y="158" text-anchor="middle" fill="#666" font-size="11">10% tax rate</text>

<g transform="translate(380 110)">
<line x1="0" y1="10" x2="40" y2="10" stroke="#666" stroke-width="2"/>
<polygon points="40,10 33,5 33,15" fill="#666"/>
</g>

<rect x="440" y="70" width="120" height="100" rx="10" fill="#f0f9f5" stroke="#4a9e6b" stroke-width="2"/>
<text x="500" y="100" text-anchor="middle" fill="#4a9e6b" font-size="11" font-weight="700">YOU KEEP</text>
<text x="500" y="135" text-anchor="middle" fill="#111" font-size="22" font-weight="700">$90</text>
<text x="500" y="158" text-anchor="middle" fill="#666" font-size="11">Net pay</text>

<text x="300" y="200" text-anchor="middle" fill="#666" font-size="12" font-style="italic">Tax is taken out before you ever see your paycheck.</text>
</svg>
