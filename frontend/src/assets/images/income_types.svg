<svg viewBox="0 0 600 280" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="35" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Common Types of Income</text>

<rect x="30" y="60" width="130" height="180" rx="12" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<g transform="translate(80 90)">
<circle cx="15" cy="15" r="14" fill="#cc0000"/>
<text x="15" y="20" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">⏱</text>
</g>
<text x="95" y="160" text-anchor="middle" fill="#111" font-size="14" font-weight="700">Wages</text>
<text x="95" y="190" text-anchor="middle" fill="#666" font-size="11">Paid by</text>
<text x="95" y="205" text-anchor="middle" fill="#666" font-size="11">the hour</text>

<rect x="170" y="60" width="130" height="180" rx="12" fill="#fff" stroke="#5b8dd9" stroke-width="2"/>
<g transform="translate(220 88)">
<rect x="0" y="0" width="30" height="36" rx="3" fill="#5b8dd9"/>
<text x="15" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">📅</text>
</g>
<text x="235" y="160" text-anchor="middle" fill="#111" font-size="14" font-weight="700">Salary</text>
<text x="235" y="190" text-anchor="middle" fill="#666" font-size="11">Fixed yearly</text>
<text x="235" y="205" text-anchor="middle" fill="#666" font-size="11">amount</text>

<rect x="310" y="60" width="130" height="180" rx="12" fill="#fff" stroke="#4a9e6b" stroke-width="2"/>
<g transform="translate(360 90)">
<circle cx="15" cy="15" r="14" fill="#4a9e6b"/>
<text x="15" y="20" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">$</text>
</g>
<text x="375" y="160" text-anchor="middle" fill="#111" font-size="14" font-weight="700">Tips</text>
<text x="375" y="190" text-anchor="middle" fill="#666" font-size="11">Extra from</text>
<text x="375" y="205" text-anchor="middle" fill="#666" font-size="11">customers</text>

<rect x="450" y="60" width="130" height="180" rx="12" fill="#fff" stroke="#b069c8" stroke-width="2"/>
<g transform="translate(500 90)">
<circle cx="15" cy="15" r="14" fill="#b069c8"/>
<text x="15" y="20" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">★</text>
</g>
<text x="515" y="160" text-anchor="middle" fill="#111" font-size="14" font-weight="700">Allowance</text>
<text x="515" y="190" text-anchor="middle" fill="#666" font-size="11">Regular gift</text>
<text x="515" y="205" text-anchor="middle" fill="#666" font-size="11">of money</text>
</svg>
