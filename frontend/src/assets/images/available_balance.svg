<svg viewBox="0 0 600 220" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Available Balance vs. Register Balance</text>

<rect x="40" y="60" width="240" height="130" rx="10" fill="#fff" stroke="#5b8dd9" stroke-width="2"/>
<text x="160" y="85" text-anchor="middle" fill="#5b8dd9" font-size="12" font-weight="700">REGISTER SHOWS</text>
<text x="160" y="125" text-anchor="middle" fill="#111" font-size="32" font-weight="700">$300</text>
<text x="160" y="155" text-anchor="middle" fill="#666" font-size="11">What the bank says</text>
<text x="160" y="170" text-anchor="middle" fill="#666" font-size="11">your balance is</text>

<rect x="320" y="60" width="240" height="130" rx="10" fill="#fff" stroke="#cc0000" stroke-width="2"/>
<text x="440" y="85" text-anchor="middle" fill="#cc0000" font-size="12" font-weight="700">TRUE AVAILABLE</text>
<text x="440" y="125" text-anchor="middle" fill="#111" font-size="32" font-weight="700">$220</text>
<text x="440" y="155" text-anchor="middle" fill="#666" font-size="11">$300 minus $80 check</text>
<text x="440" y="170" text-anchor="middle" fill="#666" font-size="11">that hasn't cleared</text>

<text x="300" y="210" text-anchor="middle" fill="#666" font-size="12" font-style="italic">Always subtract pending checks to know what you can really spend.</text>
</svg>
