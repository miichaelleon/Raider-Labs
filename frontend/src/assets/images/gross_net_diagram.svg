<svg viewBox="0 0 600 240" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<text x="300" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Gross Pay vs. Net Pay</text>

<rect x="40" y="60" width="160" height="140" rx="10" fill="#fdf6f6" stroke="#cc0000" stroke-width="2"/>
<text x="120" y="90" text-anchor="middle" fill="#cc0000" font-size="13" font-weight="700">GROSS PAY</text>
<text x="120" y="130" text-anchor="middle" fill="#111" font-size="28" font-weight="700">$1,000</text>
<text x="120" y="165" text-anchor="middle" fill="#666" font-size="12">Total earned</text>
<text x="120" y="180" text-anchor="middle" fill="#666" font-size="12">before deductions</text>

<g transform="translate(220 110)">
<line x1="0" y1="20" x2="60" y2="20" stroke="#666" stroke-width="2"/>
<polygon points="60,20 53,15 53,25" fill="#666"/>
<text x="30" y="10" text-anchor="middle" fill="#666" font-size="11" font-weight="600">minus</text>
<text x="30" y="40" text-anchor="middle" fill="#666" font-size="11">taxes</text>
</g>

<rect x="290" y="80" width="120" height="100" rx="8" fill="#fff" stroke="#888" stroke-width="2" stroke-dasharray="4 3"/>
<text x="350" y="110" text-anchor="middle" fill="#888" font-size="12" font-weight="700">DEDUCTIONS</text>
<text x="350" y="135" text-anchor="middle" fill="#666" font-size="14" font-weight="700">- $200</text>
<text x="350" y="160" text-anchor="middle" fill="#666" font-size="11">Income tax,</text>
<text x="350" y="173" text-anchor="middle" fill="#666" font-size="11">SS, Medicare</text>

<g transform="translate(430 110)">
<line x1="0" y1="20" x2="60" y2="20" stroke="#666" stroke-width="2"/>
<polygon points="60,20 53,15 53,25" fill="#666"/>
<text x="30" y="10" text-anchor="middle" fill="#666" font-size="11" font-weight="600">equals</text>
</g>

<rect x="500" y="60" width="80" height="140" rx="10" fill="#f0f9f5" stroke="#4a9e6b" stroke-width="2"/>
<text x="540" y="90" text-anchor="middle" fill="#4a9e6b" font-size="11" font-weight="700">NET PAY</text>
<text x="540" y="125" text-anchor="middle" fill="#111" font-size="20" font-weight="700">$800</text>
<text x="540" y="160" text-anchor="middle" fill="#666" font-size="11">Take-</text>
<text x="540" y="175" text-anchor="middle" fill="#666" font-size="11">home</text>
<text x="540" y="190" text-anchor="middle" fill="#666" font-size="11">pay</text>

<text x="300" y="225" text-anchor="middle" fill="#666" font-size="12" font-style="italic">Net pay = Gross pay − Deductions</text>
</svg>
